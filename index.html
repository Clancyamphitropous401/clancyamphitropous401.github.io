<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SaverSeats Live</title>
    <style>
        body { 
            margin: 0; font-family: 'Inter', sans-serif; color: #fff; height: 100vh;
            /* Direct link to stadium background */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=2000') no-repeat center center fixed;
            background-size: cover; display: flex; justify-content: center; align-items: center; 
        }
        .main-card { 
            background: rgba(20, 25, 35, 0.7); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; 
            padding: 40px; width: 800px; text-align: center; 
        }
        .data-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; }
        .data-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; }
        .data-val { display: block; font-size: 1.2rem; font-weight: bold; color: #fff; margin-top: 5px; }
    </style>
</head>
<body>

<div class="main-card">
    <h1>MATCH 102: ENGLAND vs ARGENTINA</h1>
    <div class="data-grid">
        <div class="data-box">SCORE<span id="score" class="data-val">0 - 0</span></div>
        <div class="data-box">MINUTES<span id="mins" class="data-val">0</span></div>
        <div class="data-box">STATUS<span id="stat-val" class="data-val">0</span></div>
        <div class="data-box" style="grid-column: span 2;">LIVE STATUS<span id="live-stat" class="data-val">Scheduled</span></div>
    </div>
</div>

<script>
    async function updateData() {
        try {
            // Use your exact raw Gist URL
            const response = await fetch('https://gist.githubusercontent.com/saverseats/7ada68a374797e8b479ce578956f35ed/raw/b6389921cd2f9192835dfd3d1e3e61e26214867f/world-cup-match-102-england-vs-argentina-live.json');
            const data = await response.json();
            
            // Fix: Check if data exists before setting text
            document.getElementById('score').innerText = data.score !== undefined ? data.score : "0 - 0";
            document.getElementById('mins').innerText = data.minutes !== undefined ? data.minutes : "0";
            document.getElementById('stat-val').innerText = data.status !== undefined ? data.status : "0";
            document.getElementById('live-stat').innerText = data.live_status !== undefined ? data.live_status : "Live Scheduled";
        } catch (e) {
            console.error("Fetch error:", e);
        }
    }
    updateData();
    setInterval(updateData, 30000);
</script>
</body>
</html>
