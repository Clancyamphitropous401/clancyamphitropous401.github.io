<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaverSeats - Live Updates</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --card-bg: rgba(13, 20, 35, 0.75); --border-color: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(rgba(10, 15, 30, 0.85), rgba(10, 15, 30, 0.95)), url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed; background-size: cover; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .glass-card { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--border-color); border-radius: 20px; width: 90%; max-width: 600px; padding: 40px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .cta-btn { display: inline-block; background: linear-gradient(135deg, #0070f3, #00dfd8); color: #fff; text-decoration: none; padding: 16px 35px; border-radius: 50px; font-weight: 700; margin: 20px 0; transition: 0.3s; }
        .cta-btn:hover { transform: scale(1.05); }
        .info-panel { display: flex; justify-content: space-around; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .stat-item { display: flex; flex-direction: column; }
        .label { font-size: 0.7rem; color: rgba(255,255,255,0.5); text-transform: uppercase; }
        .value { font-size: 1.2rem; font-weight: 800; background: -webkit-linear-gradient(#00dfd8, #0070f3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1 id="match-title">Loading...</h1>
        <p id="match-venue" style="color: rgba(255,255,255,0.6);">Please wait...</p>
        
        <a id="ticket-action" href="#" class="cta-btn track-click" target="_blank">Get Live Access ➔</a>

        <div class="info-panel">
            <div class="stat-item">
                <span class="label">Visitors</span>
                <span id="visit-count" class="value">0</span>
            </div>
            <div class="stat-item">
                <span class="label">Clicks</span>
                <span id="click-count" class="value">0</span>
            </div>
        </div>
    </div>

    <script>
        // 1. GIST DATA PARSER
        const gistUrl = 'https://gist.githubusercontent.com/saverseats/7ada68a374797e8b479ce578956f35ed/raw/b6389921cd2f9192835dfd3d1e3e61e26214867f/world-cup-match-102-england-vs-argentina-live.json';
        fetch(gistUrl)
            .then(r => r.json())
            .then(d => {
                const find = (o, k) => o[k] || Object.values(o).reduce((acc, v) => acc || (typeof v === 'object' ? find(v, k) : null), null);
                document.getElementById('match-title').innerText = find(d, 'name') || "England vs Argentina";
                document.getElementById('match-venue').innerText = find(d, 'location')?.name || "Mercedes-Benz Stadium";
                document.getElementById('ticket-action').href = find(d, 'url') || "https://argentinawc26.saverseats.com/";
            });

        // 2. STEALTH TRACKER
        const NS = "saverseats_main";
        const vUrl = `https://api.counterapi.dev/v1/${NS}/visits`;
        const cUrl = `https://api.counterapi.dev/v1/${NS}/clicks`;

        if (!sessionStorage.getItem("hit")) {
            fetch(`${vUrl}/up`).then(() => sessionStorage.setItem("hit", "1"));
        }
        
        fetch(vUrl).then(r => r.json()).then(d => document.getElementById("visit-count").innerText = d.value);
        fetch(cUrl).then(r => r.json()).then(d => document.getElementById("click-count").innerText = d.value);

        document.querySelector('.track-click').addEventListener('click', () => {
            fetch(`${cUrl}/up`).then(r => r.json()).then(d => document.getElementById("click-count").innerText = d.value);
        });
    </script>
</body>
</html>
