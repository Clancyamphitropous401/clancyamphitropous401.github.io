<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>England vs Argentina | SaverSeats Live</title>
    <style>
        body { 
            margin: 0; font-family: 'Inter', -apple-system, sans-serif; 
            color: #fff; height: 100vh;
            background: #0f0c29; /* Deep fallback */
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex; justify-content: center; align-items: center;
        }
        .container { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 24px; 
            padding: 50px; 
            width: 90%; max-width: 600px; 
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        h1 { margin-top: 0; font-size: 1.8rem; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; }
        .box { 
            background: rgba(0, 0, 0, 0.2); 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.05); 
            font-size: 0.9rem;
        }
        #visit-count, #click-count { font-size: 1.4rem; display: block; margin-top: 5px; color: #00dfd8; }
        #score-display { font-size: 1.6rem; color: #fff; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 16px; }
        .cta-button {
            display: block; margin-top: 30px; padding: 20px;
            background: #00dfd8; color: #000; text-decoration: none;
            font-weight: 800; border-radius: 12px; transition: 0.3s;
            font-size: 1.1rem; text-transform: uppercase;
        }
        .cta-button:hover { transform: translateY(-3px); background: #fff; box-shadow: 0 5px 15px rgba(0,223,216,0.3); }
    </style>
</head>
<body>

    <div class="container">
        <h1>MATCH 102: ENGLAND vs ARGENTINA</h1>
        <p style="opacity: 0.7;">World Cup 2026 Semi-Final | Mercedes-Benz Stadium</p>
        
        <div class="grid">
            <div class="box">LIVE VISITORS<span id="visit-count">0</span></div>
            <div class="box">LIVE CLICKS<span id="click-count">0</span></div>
        </div>

        <div id="score-display">Loading Live Data...</div>

        <a href="https://argentinawc26.saverseats.com" 
           class="cta-button" 
           target="_blank" 
           onclick="fetch('https://api.counterapi.dev/v1/saverseats_main/clicks/up')">
           GET TICKETS NOW
        </a>
    </div>

    <script>
        const NS = "saverseats_main";
        const JSON_URL = 'https://gist.githubusercontent.com/saverseats/7ada68a374797e8b479ce578956f35ed/raw/b6389921cd2f9192835dfd3d1e3e61e26214867f/world-cup-match-102-england-vs-argentina-live.json';

        async function refreshAll() {
            // Update Visits
            fetch(`https://api.counterapi.dev/v1/${NS}/visits/up`)
                .then(r => r.json()).then(d => { document.getElementById('visit-count').innerText = d.value; });
            
            // Update Clicks
            fetch(`https://api.counterapi.dev/v1/${NS}/clicks`)
                .then(r => r.json()).then(d => { document.getElementById('click-count').innerText = d.value; });
            
            // Fetch Match Data
            try {
                const res = await fetch(JSON_URL);
                const data = await res.json();
                document.getElementById('score-display').innerText = data.score || "Status: Live Scheduled";
            } catch (e) { console.error(e); }
        }

        setInterval(refreshAll, 30000);
        refreshAll();
    </script>
</body>
</html>
