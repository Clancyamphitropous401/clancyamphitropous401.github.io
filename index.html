<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>England vs Argentina | SaverSeats Live</title>
    <style>
        body { 
            margin: 0; font-family: 'Inter', -apple-system, sans-serif; 
            color: #fff; height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=2000') no-repeat center center fixed;
            background-size: cover;
            display: flex; justify-content: center; align-items: center;
        }
        .container { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 30px; 
            padding: 50px; 
            width: 90%; max-width: 500px; 
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h1 { margin: 0 0 10px 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; }
        .box { 
            background: rgba(0, 0, 0, 0.3); 
            padding: 15px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        .counter-val { font-size: 1.5rem; color: #00dfd8; display: block; font-weight: bold; }
        #score-display { 
            font-size: 2rem; color: #fff; padding: 25px; 
            background: rgba(0,0,0,0.4); border-radius: 15px; 
            border: 1px solid #00dfd8;
        }
        .cta-button {
            display: block; margin-top: 30px; padding: 20px;
            background: #00dfd8; color: #000; text-decoration: none;
            font-weight: 900; border-radius: 12px; transition: 0.3s;
            text-transform: uppercase; font-size: 1.1rem;
        }
        .cta-button:hover { transform: scale(1.02); background: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <h1>ENGLAND VS ARGENTINA</h1>
        <p style="opacity: 0.6; margin-bottom: 30px;">World Cup 2026 | Mercedes-Benz Stadium</p>
        
        <div id="score-display">Fetching...</div>

        <div class="grid">
            <div class="box">LIVE VIEWERS<span id="visit-count" class="counter-val">0</span></div>
            <div class="box">TICKET CLICKS<span id="click-count" class="counter-val">0</span></div>
        </div>

        <a href="https://argentinawc26.saverseats.com" 
           class="cta-button" 
           target="_blank" 
           onclick="fetch('https://api.counterapi.dev/v1/saverseats_main/clicks/up')">
           GET TICKETS NOW
        </a>
    </div>

    <script>
        const NS = "saverseats_main";
        const KEY = "53fba66fb27b4b2594dafb10a83b1000";
        const JSON_URL = 'https://gist.githubusercontent.com/saverseats/7ada68a374797e8b479ce578956f35ed/raw/b6389921cd2f9192835dfd3d1e3e61e26214867f/world-cup-match-102-england-vs-argentina-live.json';

        async function updateStats() {
            // Update Visits
            fetch(`https://api.counterapi.dev/v1/${NS}/visits/up`)
                .then(r => r.json())
                .then(d => { document.getElementById('visit-count').innerText = d.value; });
            
            // Update Clicks
            fetch(`https://api.counterapi.dev/v1/${NS}/clicks`)
                .then(r => r.json())
                .then(d => { document.getElementById('click-count').innerText = d.value; });
        }

        async function updateScore() {
            try {
                const res = await fetch(JSON_URL);
                const data = await res.json();
                document.getElementById('score-display').innerText = data.score || "Live Scheduled";
            } catch (e) { console.error("Score fetch failed"); }
        }

        // Ping IndexNow for SEO
        function pingIndexNow() {
            fetch(`https://api.indexnow.org/indexnow?url=${encodeURIComponent(window.location.href)}&key=${KEY}`, { method: 'POST' });
        }

        // Run functions
        function refreshAll() {
            updateStats();
            updateScore();
            pingIndexNow();
        }

        setInterval(refreshAll, 30000);
        refreshAll();
    </script>
</body>
</html>
