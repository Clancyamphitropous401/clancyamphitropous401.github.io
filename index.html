<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SaverSeats Live</title>
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; color: #fff; height: 100vh;
               background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=2000') no-repeat center center fixed;
               background-size: cover; display: flex; justify-content: center; align-items: center; }
        .main-card { background: rgba(20, 25, 35, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); 
                     border-radius: 20px; padding: 40px; width: 800px; text-align: center; }
        .live-badge { background: #ff0000; padding: 5px 15px; border-radius: 5px; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        .data-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; }
        .data-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; font-size: 0.8rem; }
        .data-val { display: block; font-size: 1.2rem; font-weight: bold; color: #fff; margin-top: 5px; }
        .cta-btn { display: block; background: #3b82f6; padding: 15px; border-radius: 10px; text-decoration: none; color: #fff; font-weight: bold; margin: 20px 0; }
        .events-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .event-card { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="live-badge">LIVE (())</div>
    <h1>MATCH 102: ENGLAND vs ARGENTINA</h1>
    <p>World Cup 2026 Semi-Final | Mercedes-Benz Stadium, Atlanta</p>

    <div class="data-grid">
        <div class="data-box">SCORE<span id="score" class="data-val">0 - 0</span></div>
        <div class="data-box">MINUTES<span id="mins" class="data-val">0</span></div>
        <div class="data-box">STATUS<span id="stat-val" class="data-val">0</span></div>
        <div class="data-box" style="grid-column: span 2;">LIVE STATUS<span id="live-stat" class="data-val">Live Scheduled</span></div>
    </div>

    <a href="https://argentinawc26.saverseats.com" class="cta-btn" onclick="trackClick()">VIEW LIVE TRACKER & GET TICKETS -></a>

    <div class="events-grid">
        <div class="event-card"><div>Coldplay<br><small>2022 - Concert</small></div><button>TICKETS</button></div>
        <div class="event-card"><div>NFL Game<br><small>2026 - Atlanta</small></div><button>TICKETS</button></div>
    </div>
</div>

<script>
    async function updateData() {
        try {
            // Using a fallback structure to prevent "undefined"
            const res = await fetch('https://gist.githubusercontent.com/saverseats/7ada68a374797e8b479ce578956f35ed/raw/data.json');
            const data = await res.json();
            document.getElementById('score').innerText = data.score || "0 - 0";
            document.getElementById('mins').innerText = data.minutes || "0";
            document.getElementById('stat-val').innerText = data.status || "0";
            document.getElementById('live-stat').innerText = data.live_status || "Live Scheduled";
        } catch (e) {
            console.log("Using default values due to fetch error.");
        }
    }
    
    function trackClick() {
        fetch('https://api.counterapi.dev/v1/saverseats_main/clicks/up');
    }

    updateData();
    setInterval(updateData, 30000);
</script>
</body>
</html>
