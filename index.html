<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>England vs Argentina | SaverSeats Live</title>
    <style>
        /* Stadium background with high priority */
        body { 
            margin: 0; font-family: 'Inter', sans-serif; color: #fff; 
            height: 100vh; width: 100vw;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=2000') !important;
            background-size: cover !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
            display: flex; justify-content: center; align-items: center; 
        }
        .main-card { 
            background: rgba(20, 25, 35, 0.7); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; 
            padding: 40px; width: 700px; text-align: center; 
        }
        .data-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 25px 0; }
        .data-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; font-size: 0.8rem; }
        .data-val { display: block; font-size: 1.2rem; font-weight: bold; color: #fff; margin-top: 5px; }
        .cta-button {
            display: block; width: 100%; padding: 20px; margin-top: 20px;
            background: #3b82f6; color: #fff; text-decoration: none;
            font-weight: bold; border-radius: 10px; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="main-card">
    <h1>MATCH 102: ENGLAND vs ARGENTINA</h1>
    <div class="data-grid">
        <div class="data-box">SCORE<span id="score" class="data-val">0 - 0</span></div>
        <div class="data-box">MINUTES<span id="mins" class="data-val">0</span></div>
        <div class="data-box">STATUS<span id="stat-val" class="data-val">0</span></div>
        <div class="data-box">LIVE<span id="live-stat" class="data-val">Ready</span></div>
    </div>

    <!-- The Button -->
    <a href="https://argentinawc26.saverseats.com" 
       class="cta-button" 
       target="_blank" 
       onclick="trackClick()">VIEW LIVE TRACKER & GET TICKETS</a>
</div>

<script>
    const NS = "saverseats_main";
    const KEY = "53fba66fb27b4b2594dafb10a83b1000";
    const JSON_URL = 'https://gist.githubusercontent.com/saverseats/7ada68a374797e8b479ce578956f35ed/raw/b6389921cd2f9192835dfd3d1e3e61e26214867f/world-cup-match-102-england-vs-argentina-live.json';

    // 1. Data Update Function
    async function updateData() {
        try {
            const res = await fetch(JSON_URL);
            const data = await res.json();
            document.getElementById('score').innerText = data.score || "0 - 0";
            document.getElementById('mins').innerText = data.minutes || "0";
            document.getElementById('stat-val').innerText = data.status || "0";
            document.getElementById('live-stat').innerText = data.live_status || "Live";
        } catch (e) { console.error("Fetch failed"); }
    }

    // 2. Click Tracking
    function trackClick() {
        fetch(`https://api.counterapi.dev/v1/${NS}/clicks/up`);
    }

    // 3. SEO Ping
    function pingSEO() {
        fetch(`https://api.indexnow.org/indexnow?url=${encodeURIComponent(window.location.href)}&key=${KEY}`, { method: 'POST' });
    }

    // Initialize
    updateData();
    pingSEO();
    setInterval(updateData, 30000);
</script>
</body>
</html>
