<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaverSeats | Live Event Portal</title>
    <style>
        :root { --bg: #0a0f1e; --accent: #00dfd8; --card: rgba(13, 20, 35, 0.75); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; text-align: center; width: 90%; max-width: 450px; }
        .timer { font-size: 2rem; font-weight: 800; color: var(--accent); margin: 20px 0; }
        .cta { background: var(--accent); color: #000; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: 700; display: inline-block; }
    </style>
</head>
<body>
    <div class="card">
        <h1>SaverSeats</h1>
        <p>Managed by [Your Name]</p>
        <div class="timer" id="countdown">Loading...</div>
        <a href="#" id="ticket-link" class="cta">Get Tickets</a>
    </div>

    <script>
        // 3 PM Eastern = 15:00:00 ET
        const targetDate = new Date("July 20, 2026 15:00:00 GMT-0400").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById("countdown").innerText = `${d}d ${h}h ${m}m ${s}s`;
        }
        
        // Automated SEO Ping
        async function autoPing() {
            const url = window.location.href;
            const key = "YOUR_API_KEY"; // Replace with your actual key
            try {
                await fetch(`https://api.indexnow.org/indexnow?url=${encodeURIComponent(url)}&key=${key}`, {method: 'POST'});
            } catch (e) { console.log("Ping skipped"); }
        }

        setInterval(updateTimer, 1000);
        setInterval(autoPing, 30000); // Pings every 30 seconds
        autoPing();
    </script>
</body>
</html>
